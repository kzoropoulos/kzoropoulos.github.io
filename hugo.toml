# Base site configuration
baseURL = "https://kzoropoulos.github.io/"
languageCode = "en-us"
title = "Konstantinos Zoropoulos | MEng Candidate"
theme = "PaperMod"

# Global theme parameters
[params]
env = "production"
description = "Academic and engineering portfolio focusing on hardware-software integration."
author = "Konstantinos Zoropoulos"
backgroundImage = "dark2.jpg"
ShowReadingTime = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
math = true
defaultTheme = "dark"
disableThemeToggle = true

# Favicon assets
[params.assets]
favicon = "/favicon.ico"
favicon16x16 = "/favicon-16x16.png"
favicon32x32 = "/favicon-32x32.png"
apple_touch_icon = "/apple-touch-icon.png"

# Homepage profile configuration
[params.profileMode]
enabled = true
title = "MEng Candidate in Computer Engineering & Informatics<br>University of Patras"
subtitle = "Specializing in Hardware-Software Integration, Embedded Systems, and Low-Level Architecture (*C, C++, [RISC-V](https://riscv.org/)*).<br>Actively seeking an industry internship for **Summer 2027**."

# Primary call-to-action buttons
[[params.profileMode.buttons]]
name = "View Projects"
url = "/projects/"

[[params.profileMode.buttons]]
name = "Download CV"
url = "/CV_Kostas_Zoropoulos.pdf"

# Social links and contact information
[[params.socialIcons]]
name = "github"
url = "https://github.com/kzoropoulos"

[[params.socialIcons]]
name = "linkedin"
url = "https://www.linkedin.com/in/kzoropoulos/"

[[params.socialIcons]]
name = "email"
url = "mailto:kostaszoropoulos@gmail.com"

[[params.socialIcons]]
name = "phone"
url = "tel:+306988633078"

# Main navigation menu
[menu]
  [[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 10

  [[menu.main]]
  identifier = "academic"
  name = "Academic Profile"
  url = "/academic/"
  weight = 20

  [[menu.main]]
  identifier = "about"
  name = "About me"
  url = "/about/"
  weight = 30

# Markdown rendering settings
[markup.goldmark.renderer]
unsafe = true
